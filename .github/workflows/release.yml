name: Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  conventional_commits:
    name: Check conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@v4
        with:
          command: check
          args: ${{ github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || github.event_name == 'push' && !github.event.forced && format('{0}..{1}', github.event.before, github.sha) || '' }}

  release_please:
    name: Release Please
    needs: conventional_commits
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      created: ${{ steps.release.outputs.release_created }}
      html_url: ${{ steps.release.outputs.html_url }}
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Update release pull request or create release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  release:
    name: Build and upload macOS ARM64 artifacts
    needs: release_please
    if: needs.release_please.outputs.created == 'true'
    runs-on: macos-15
    timeout-minutes: 40
    permissions:
      contents: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.release_please.outputs.tag }}
      RELEASE_URL: ${{ needs.release_please.outputs.html_url }}
      RELEASE_VERSION: ${{ needs.release_please.outputs.version }}

    steps:
      - name: Check out released source
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release_please.outputs.sha }}
          persist-credentials: false

      - name: Install stable Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable

      - name: Restore cached FFmpeg
        id: ffmpeg-cache
        uses: actions/cache@v6
        with:
          path: |
            ${{ runner.temp }}/ffmpeg.gz
            ${{ runner.temp }}/ffmpeg-6.1.6.tar.xz
          key: dropcast-ffmpeg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-ffmpeg.sh') }}

      - name: Build redistributable FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          scripts/build-ffmpeg.sh \
            "$RUNNER_TEMP/ffmpeg.gz" \
            "$RUNNER_TEMP/ffmpeg-6.1.6.tar.xz"

      - name: Select release FFmpeg
        run: |
          test -f "$RUNNER_TEMP/ffmpeg.gz"
          test -f "$RUNNER_TEMP/ffmpeg-6.1.6.tar.xz"
          echo "DROPCAST_FFMPEG_ARCHIVE=$RUNNER_TEMP/ffmpeg.gz" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --locked --release

      - name: Build release binary
        run: cargo build --locked --release

      - name: Verify release binary
        run: |
          file target/release/dropcast
          file target/release/dropcast | grep -q "arm64"
          test "$(target/release/dropcast --version)" = "$RELEASE_VERSION"

      - name: Build and verify macOS app
        run: |
          scripts/package-macos-app.sh
          test -s target/macos/Dropcast.app/Contents/Resources/AppIcon.icns
          test "$(plutil -extract CFBundleShortVersionString raw -o - \
            target/macos/Dropcast.app/Contents/Info.plist)" = "$RELEASE_VERSION"
          test "$(plutil -extract CFBundleIconFile raw -o - \
            target/macos/Dropcast.app/Contents/Info.plist)" = "AppIcon.icns"
          file target/macos/Dropcast.app/Contents/MacOS/Dropcast
          file target/macos/Dropcast.app/Contents/MacOS/Dropcast | grep -q "arm64"
          codesign --verify --deep --strict --verbose=2 target/macos/Dropcast.app

      - name: Package release
        id: package
        run: |
          package_name="dropcast-${RELEASE_VERSION}-macos-arm64"
          archive="${package_name}.tar.gz"
          app_archive="${package_name}.app.zip"
          source_archive="ffmpeg-6.1.6.tar.xz"
          checksum_file="dropcast-${RELEASE_VERSION}-SHA256SUMS.txt"

          mkdir -p "dist/${package_name}"
          cp target/release/dropcast README.md LICENSE THIRD_PARTY_LICENSES.md \
            "dist/${package_name}/"
          cp -R LICENSES scripts "dist/${package_name}/"
          COPYFILE_DISABLE=1 tar -C dist -czf "dist/${archive}" "${package_name}"
          ditto -c -k --sequesterRsrc --keepParent \
            target/macos/Dropcast.app "dist/${app_archive}"
          cp "$RUNNER_TEMP/${source_archive}" "dist/${source_archive}"

          archive_checksum="$(shasum -a 256 "dist/${archive}" | awk '{print $1}')"
          app_checksum="$(shasum -a 256 "dist/${app_archive}" | awk '{print $1}')"
          source_checksum="$(shasum -a 256 "dist/${source_archive}" | awk '{print $1}')"
          {
            printf '%s  %s\n' "$archive_checksum" "$archive"
            printf '%s  %s\n' "$app_checksum" "$app_archive"
            printf '%s  %s\n' "$source_checksum" "$source_archive"
          } > "dist/${checksum_file}"

          verify_dir="$(mktemp -d "$RUNNER_TEMP/dropcast-app-verify.XXXXXX")"
          ditto -x -k "dist/${app_archive}" "$verify_dir"
          codesign --verify --deep --strict --verbose=2 \
            "$verify_dir/Dropcast.app"

          {
            echo "archive=dist/${archive}"
            echo "app=dist/${app_archive}"
            echo "checksum=dist/${checksum_file}"
            echo "source=dist/${source_archive}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to GitHub release
        env:
          APP: ${{ steps.package.outputs.app }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          SOURCE: ${{ steps.package.outputs.source }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$APP#Dropcast macOS ARM64 app" \
            "$ARCHIVE#macOS ARM64 archive" \
            "$CHECKSUM#SHA-256 checksums" \
            "$SOURCE#Corresponding FFmpeg source" \
            --repo "$GITHUB_REPOSITORY"

          printf '## Release artifacts uploaded\n\n[%s](%s)\n' \
            "$RELEASE_TAG" "$RELEASE_URL" >> "$GITHUB_STEP_SUMMARY"
