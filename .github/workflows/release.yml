name: Release

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  conventional_commits:
    name: Check conventional commits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Check out full history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Check conventional commits
        uses: cocogitto/cocogitto-action@9a9fe03b31c47444290c0d7f9b1ee1b44ee13f20 # v4.1.0
        with:
          command: check
          args: ${{ github.event_name == 'pull_request' && format('{0}..{1}', github.event.pull_request.base.sha, github.event.pull_request.head.sha) || github.event_name == 'push' && format('{0}..{1}', github.event.before, github.sha) || '' }}

  release_please:
    name: Release Please
    needs: conventional_commits
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      created: ${{ steps.release.outputs.release_created }}
      html_url: ${{ steps.release.outputs.html_url }}
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Update release pull request or create release
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0

  release:
    name: Build and upload macOS ARM64 artifact
    needs: release_please
    if: needs.release_please.outputs.created == 'true'
    runs-on: macos-15
    timeout-minutes: 40
    permissions:
      contents: write
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.release_please.outputs.tag }}
      RELEASE_URL: ${{ needs.release_please.outputs.html_url }}
      RELEASE_VERSION: ${{ needs.release_please.outputs.version }}

    steps:
      - name: Check out released source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ needs.release_please.outputs.sha }}
          persist-credentials: false

      - name: Install stable Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --no-self-update
          rustup default stable

      - name: Build redistributable FFmpeg
        run: |
          scripts/build-ffmpeg.sh \
            "$RUNNER_TEMP/ffmpeg.gz" \
            "$RUNNER_TEMP/ffmpeg-6.1.6.tar.xz"
          echo "DROPCAST_FFMPEG_ARCHIVE=$RUNNER_TEMP/ffmpeg.gz" >> "$GITHUB_ENV"

      - name: Run tests
        run: cargo test --locked --release

      - name: Build release binary
        run: cargo build --locked --release

      - name: Verify release binary
        run: |
          file target/release/dropcast
          file target/release/dropcast | grep -q "arm64"
          test "$(target/release/dropcast --version)" = "$RELEASE_VERSION"

      - name: Package release
        id: package
        run: |
          package_name="dropcast-${RELEASE_VERSION}-macos-arm64"
          archive="${package_name}.tar.gz"
          source_archive="ffmpeg-6.1.6.tar.xz"
          checksum_file="dropcast-${RELEASE_VERSION}-SHA256SUMS.txt"

          mkdir -p "dist/${package_name}"
          cp target/release/dropcast README.md LICENSE THIRD_PARTY_LICENSES.md \
            "dist/${package_name}/"
          cp -R LICENSES scripts "dist/${package_name}/"
          COPYFILE_DISABLE=1 tar -C dist -czf "dist/${archive}" "${package_name}"
          cp "$RUNNER_TEMP/${source_archive}" "dist/${source_archive}"

          archive_checksum="$(shasum -a 256 "dist/${archive}" | awk '{print $1}')"
          source_checksum="$(shasum -a 256 "dist/${source_archive}" | awk '{print $1}')"
          {
            printf '%s  %s\n' "$archive_checksum" "$archive"
            printf '%s  %s\n' "$source_checksum" "$source_archive"
          } > "dist/${checksum_file}"

          {
            echo "archive=dist/${archive}"
            echo "checksum=dist/${checksum_file}"
            echo "source=dist/${source_archive}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifacts to GitHub release
        env:
          ARCHIVE: ${{ steps.package.outputs.archive }}
          CHECKSUM: ${{ steps.package.outputs.checksum }}
          SOURCE: ${{ steps.package.outputs.source }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "$ARCHIVE#macOS ARM64 archive" \
            "$CHECKSUM#SHA-256 checksums" \
            "$SOURCE#Corresponding FFmpeg source" \
            --repo "$GITHUB_REPOSITORY"

          printf '## Release artifacts uploaded\n\n[%s](%s)\n' \
            "$RELEASE_TAG" "$RELEASE_URL" >> "$GITHUB_STEP_SUMMARY"
