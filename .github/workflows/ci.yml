name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install stable Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable --component clippy,rustfmt --no-self-update
          rustup default stable

      - name: Restore cached FFmpeg
        id: ffmpeg-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/ffmpeg.gz
          key: dropcast-ffmpeg-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build-ffmpeg.sh') }}

      - name: Build test FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: scripts/build-ffmpeg.sh "$RUNNER_TEMP/ffmpeg.gz"

      - name: Select test FFmpeg
        run: |
          test -f "$RUNNER_TEMP/ffmpeg.gz"
          echo "DROPCAST_FFMPEG_ARCHIVE=$RUNNER_TEMP/ffmpeg.gz" >> "$GITHUB_ENV"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --locked
